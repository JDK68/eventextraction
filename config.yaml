seed: 42

data:
  raw_dir: ../data/raw
  file_glob: "*.csv"
  sep: ","
  encoding: "utf-8"
  site_id_source: "filename"
  label_col: "label"

targets:
  event_content_positive_labels:
    - "Date"
    - "DateTime"
    - "StartTime"
    - "EndTime"
    - "StartEndTime"
    - "Time"
    - "TimeLocation"
    - "Location"
    - "Name"
    - "NameLocation"
    - "Description"

  event_anchor_positive_labels:
    - "Date"
    - "DateTime"
    - "StartTime"
    - "EndTime"
    - "StartEndTime"
    - "Time"
    - "TimeLocation"
    - "Location"

eval:
  ks: [1, 3, 5, 10]

sampling:
  keep_neg_ratio: 0.15

model:
  learning_rate: 0.05
  num_leaves: 63
  min_data_in_leaf: 30
  feature_fraction: 0.9
  bagging_fraction: 0.8
  bagging_freq: 1
  lambda_l2: 1.0
  num_boost_round: 400